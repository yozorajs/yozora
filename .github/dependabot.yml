# Dependabot configuration
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # ── JavaScript / TypeScript deps (pnpm workspace; resolved via pnpm-lock.yaml) ──
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Runtime deps are zero, so batch all dev minor/patch bumps into a single
      # PR — avoids each bump burning a full 3-node CI matrix run. Major bumps
      # still open individually for isolated review.
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  # ── GitHub Actions used by the CI workflow (checkout, setup-node, pnpm/action-setup) ──
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - github-actions
